<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Login Admin</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { margin: 10px; padding: 10px; }
        .result { border: 1px solid #ccc; padding: 10px; margin: 10px 0; background: #f9f9f9; }
        .error { background: #ffe6e6; border-color: #ff9999; }
        .success { background: #e6ffe6; border-color: #99ff99; }
    </style>
</head>
<body>
    <h1>🔧 Teste de Login Admin</h1>
    
    <div>
        <h3>1. Testar Login</h3>
        <button onclick="testLogin()">Login com admin@williamdiskpizza.com</button>
        <div id="loginResult" class="result"></div>
    </div>

    <div>
        <h3>2. Testar API Admin</h3>
        <button onclick="testAdminAPI()">Testar /api/admin/profile</button>
        <div id="apiResult" class="result"></div>
    </div>

    <div>
        <h3>3. Verificar Token</h3>
        <button onclick="checkToken()">Verificar Token no LocalStorage</button>
        <div id="tokenResult" class="result"></div>
    </div>

    <script>
        async function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            resultDiv.innerHTML = '🔄 Fazendo login...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@williamdiskpizza.com',
                        password: 'admin123'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('auth-token', data.token);
                    localStorage.setItem('user-data', JSON.stringify(data.user));
                    
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        ✅ Login realizado com sucesso!<br>
                        👤 Usuário: ${data.user.full_name}<br>
                        📧 Email: ${data.user.email}<br>
                        🔑 Role: ${data.user.role}<br>
                        🎯 Token salvo no localStorage
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `❌ Erro no login: ${data.error}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `💥 Erro: ${error.message}`;
            }
        }

        async function testAdminAPI() {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.innerHTML = '🔄 Testando API...';

            const token = localStorage.getItem('auth-token');
            if (!token) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Nenhum token encontrado. Faça login primeiro.';
                return;
            }

            try {
                const response = await fetch('/api/admin/profile', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        ✅ API funcionando!<br>
                        📊 Status: ${response.status}<br>
                        👤 Perfil: ${data.profile.full_name}<br>
                        📧 Email: ${data.profile.email}<br>
                        🕒 Timestamp: ${data.timestamp}
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `❌ Erro na API (${response.status}): ${data.error}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `💥 Erro: ${error.message}`;
            }
        }

        function checkToken() {
            const resultDiv = document.getElementById('tokenResult');
            
            const token = localStorage.getItem('auth-token');
            const userData = localStorage.getItem('user-data');

            if (token && userData) {
                try {
                    const user = JSON.parse(userData);
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        ✅ Token encontrado!<br>
                        🔑 Token: ${token.substring(0, 50)}...<br>
                        👤 Usuário: ${user.name}<br>
                        📧 Email: ${user.email}<br>
                        🎯 Role: ${user.role}
                    `;
                } catch (e) {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = '❌ Erro ao parsear dados do usuário';
                }
            } else {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ Nenhum token ou dados de usuário encontrados';
            }
        }

        // Auto-verificar token ao carregar a página
        window.onload = checkToken;
    </script>
</body>
</html>
